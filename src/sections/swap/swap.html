<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cryon — Points Converter</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --blue-500: oklch(60% 0.22 250);
    --blue-400: oklch(70% 0.20 250);
    --blue-300: oklch(78% 0.17 250);
    --blue-glow: oklch(60% 0.22 250 / 0.3);
    --blue-dim: oklch(60% 0.22 250 / 0.12);
    --blue-border: oklch(60% 0.22 250 / 0.25);
    --n950: #080b10;
    --n900: #0d1117;
    --n850: #111720;
    --n800: #161e2a;
    --n700: #1e2a3a;
    --n600: #2a3a50;
    --n400: #5a7090;
    --n300: #7a90a8;
    --n200: #a0b4c8;
    --n100: #c8d8e8;
    --white: #e8f0f8;
    --green: oklch(65% 0.18 155);
    --green-dim: oklch(65% 0.18 155 / 0.15);
    --red: oklch(60% 0.22 25);
    --red-dim: oklch(60% 0.22 25 / 0.12);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; }
  body {
    font-family: 'Space Grotesk', sans-serif;
    background: var(--n950);
    color: var(--white);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  #root { min-height: 100vh; }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--n700); border-radius: 3px; }
  input[type=number]::-webkit-outer-spin-button,
  input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
  input[type=number] { -moz-appearance: textfield; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(16px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 6px var(--green); }
    50%       { opacity: 0.5; box-shadow: none; }
  }
  @keyframes scanline {
    from { transform: translateY(-100%); }
    to   { transform: translateY(100vh); }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── THEME TOKENS (JS mirrors CSS vars) ── */
const T = {
  n950:'#080b10', n900:'#0d1117', n850:'#111720', n800:'#161e2a',
  n700:'#1e2a3a', n600:'#2a3a50', n400:'#5a7090', n300:'#7a90a8',
  n200:'#a0b4c8', n100:'#c8d8e8', white:'#e8f0f8',
  blue:'oklch(60% 0.22 250)', blue4:'oklch(70% 0.20 250)', blue3:'oklch(78% 0.17 250)',
  blueDim:'oklch(60% 0.22 250 / 0.12)', blueBorder:'oklch(60% 0.22 250 / 0.25)',
  blueGlow:'oklch(60% 0.22 250 / 0.3)',
  green:'oklch(65% 0.18 155)', greenDim:'oklch(65% 0.18 155 / 0.15)',
  red:'oklch(60% 0.22 25)', redDim:'oklch(60% 0.22 25 / 0.12)',
};

/* ── BRAND DATA ── */
const BRANDS = [
  { id:'mcdonalds', name:"McDonald's", unit:'Points',  color:'#e8a020', balance:3200,
    logo:(s=32)=><svg width={s} height={s} viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="#DA291C"/><text x="16" y="22" textAnchor="middle" fontSize="16" fontWeight="800" fill="#FFC72C" fontFamily="Arial Black,Arial">M</text></svg> },
  { id:'starbucks', name:'Starbucks',  unit:'Stars',   color:'#3dba7b', balance:840,
    logo:(s=32)=><svg width={s} height={s} viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="#00704A"/><circle cx="16" cy="16" r="7" stroke="white" strokeWidth="1.5" fill="none"/><path d="M16 10 L17.2 13.8 L21 13.8 L18 16.2 L19 20 L16 17.5 L13 20 L14 16.2 L11 13.8 L14.8 13.8 Z" fill="white"/></svg> },
  { id:'kfc',       name:'KFC',        unit:'Points',  color:'#e05060', balance:1500,
    logo:(s=32)=><svg width={s} height={s} viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="#E4002B"/><text x="16" y="22" textAnchor="middle" fontSize="11" fontWeight="800" fill="white" fontFamily="Arial">KFC</text></svg> },
  { id:'wendys',    name:"Wendy's",    unit:'Points',  color:'#e05060', balance:2100,
    logo:(s=32)=><svg width={s} height={s} viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="#E2231A"/><text x="16" y="22" textAnchor="middle" fontSize="14" fontWeight="800" fill="white" fontFamily="Arial">W</text></svg> },
  { id:'subway',    name:'Subway',     unit:'Tokens',  color:'#3dba7b', balance:680,
    logo:(s=32)=><svg width={s} height={s} viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="#009B3A"/><text x="16" y="21" textAnchor="middle" fontSize="10" fontWeight="800" fill="#FFC600" fontFamily="Arial">SUB</text></svg> },
  { id:'dominos',   name:"Domino's",   unit:'Points',  color:'#6b9fff', balance:950,
    logo:(s=32)=><svg width={s} height={s} viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="#006491"/><rect x="8" y="10" width="7" height="12" rx="2" fill="#E31837"/><rect x="17" y="10" width="7" height="12" rx="2" fill="white"/><circle cx="11.5" cy="16" r="1.5" fill="white"/><circle cx="20.5" cy="13" r="1.5" fill="#006491"/><circle cx="20.5" cy="19" r="1.5" fill="#006491"/></svg> },
  { id:'hilton',    name:'Hilton',     unit:'Points',  color:'#6b9fff', balance:12000,
    logo:(s=32)=><svg width={s} height={s} viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="#003087"/><text x="16" y="22" textAnchor="middle" fontSize="12" fontWeight="700" fill="white" fontFamily="Georgia,serif">H</text></svg> },
  { id:'marriott',  name:'Marriott',   unit:'Points',  color:'#e8a020', balance:8500,
    logo:(s=32)=><svg width={s} height={s} viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="#8A0000"/><text x="16" y="22" textAnchor="middle" fontSize="13" fontWeight="700" fill="white" fontFamily="Georgia,serif">M</text></svg> },
];

const RATES = {
  'mcdonalds-starbucks':0.66,'mcdonalds-kfc':0.90,'mcdonalds-wendys':0.88,
  'mcdonalds-subway':0.72,'mcdonalds-dominos':0.80,'mcdonalds-hilton':0.05,'mcdonalds-marriott':0.04,
  'starbucks-mcdonalds':1.50,'starbucks-kfc':1.40,'starbucks-wendys':1.35,
  'starbucks-subway':1.20,'starbucks-dominos':1.30,'starbucks-hilton':0.08,'starbucks-marriott':0.07,
  'hilton-marriott':0.90,'hilton-mcdonalds':15.0,'hilton-starbucks':10.5,
  'marriott-hilton':1.10,'marriott-mcdonalds':18.0,'marriott-starbucks':12.0,
};
function getRate(a,b){const k=`${a}-${b}`,r=`${b}-${a}`;return RATES[k]||(RATES[r]?+(1/RATES[r]).toFixed(4):0.75);}
const FEE = 0.015;

const HISTORY_INIT = [
  {id:1,from:'mcdonalds',to:'starbucks',fromAmt:500,toAmt:330,date:'Apr 28, 2026'},
  {id:2,from:'hilton',to:'marriott',fromAmt:2000,toAmt:1800,date:'Apr 25, 2026'},
  {id:3,from:'kfc',to:'wendys',fromAmt:300,toAmt:264,date:'Apr 20, 2026'},
];

/* ── LOGO SVG ── */
function CryonLogo({size=30}){
  return (
    <svg width={size} height={size} viewBox="0 0 32 32" fill="none">
      <circle cx="16" cy="16" r="15" stroke="oklch(60% 0.22 250 / 0.3)" strokeWidth="1"/>
      <line x1="16" y1="4" x2="16" y2="28" stroke="oklch(70% 0.20 250)" strokeWidth="1.8" strokeLinecap="round"/>
      <line x1="4" y1="16" x2="28" y2="16" stroke="oklch(70% 0.20 250)" strokeWidth="1.8" strokeLinecap="round"/>
      <line x1="7.5" y1="7.5" x2="24.5" y2="24.5" stroke="oklch(70% 0.20 250)" strokeWidth="1.8" strokeLinecap="round"/>
      <line x1="24.5" y1="7.5" x2="7.5" y2="24.5" stroke="oklch(70% 0.20 250)" strokeWidth="1.8" strokeLinecap="round"/>
      <circle cx="16" cy="16" r="3" fill="oklch(70% 0.20 250)" opacity="0.9"/>
    </svg>
  );
}

/* ── BRAND DROPDOWN ── */
function BrandDropdown({selected, onChange, exclude}){
  const [open, setOpen] = useState(false);
  const ref = useRef();
  const brand = BRANDS.find(b=>b.id===selected);

  useEffect(()=>{
    const h = e=>{ if(ref.current&&!ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener('mousedown',h);
    return ()=>document.removeEventListener('mousedown',h);
  },[]);

  return (
    <div ref={ref} style={{position:'relative'}}>
      <button onClick={()=>setOpen(!open)} style={{
        display:'flex',alignItems:'center',gap:10,
        background: open ? T.n700 : T.n800,
        border:`1.5px solid ${open ? T.blue4 : T.n700}`,
        borderRadius:12,padding:'10px 14px',cursor:'pointer',
        width:'100%',transition:'all .15s',
        boxShadow: open ? `0 0 0 3px ${T.blueDim}` : 'none',
      }}>
        {brand.logo(26)}
        <div style={{flex:1,textAlign:'left'}}>
          <div style={{fontSize:15,fontWeight:600,color:T.white}}>{brand.name}</div>
          <div style={{fontSize:11,color:T.n300,fontFamily:'Space Mono, monospace'}}>{brand.unit}</div>
        </div>
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke={T.n400} strokeWidth="2" strokeLinecap="round"
          style={{transform:open?'rotate(180deg)':'none',transition:'transform .2s',flexShrink:0}}>
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </button>

      {open && (
        <div style={{
          position:'absolute',top:'calc(100% + 8px)',left:0,right:0,
          background:T.n850,border:`1px solid ${T.n700}`,borderRadius:14,
          boxShadow:'0 16px 48px rgba(0,0,0,0.5)',zIndex:50,overflow:'hidden',
        }}>
          {BRANDS.filter(b=>b.id!==exclude).map(b=>(
            <button key={b.id} onClick={()=>{onChange(b.id);setOpen(false);}} style={{
              display:'flex',alignItems:'center',gap:10,
              width:'100%',padding:'11px 14px',border:'none',
              background: b.id===selected ? T.n700 : 'transparent',
              cursor:'pointer',transition:'background .1s',
            }}
              onMouseEnter={e=>{if(b.id!==selected)e.currentTarget.style.background=T.n800;}}
              onMouseLeave={e=>{if(b.id!==selected)e.currentTarget.style.background='transparent';}}>
              {b.logo(24)}
              <div style={{textAlign:'left'}}>
                <div style={{fontSize:13,fontWeight:600,color:T.white}}>{b.name}</div>
                <div style={{fontSize:11,color:T.n400,fontFamily:'Space Mono,monospace'}}>{b.unit}</div>
              </div>
              {b.id===selected&&(
                <svg style={{marginLeft:'auto'}} width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={T.blue4} strokeWidth="2.5" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>
              )}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

/* ── MODAL ── */
function Modal({show,onClose,fromBrand,toBrand,fromAmt,toAmt,rate,fee,onConfirm,status}){
  if(!show) return null;
  const unitFrom = fromBrand.unit.replace(/s$/,'');
  const unitTo   = toBrand.unit.replace(/s$/,'');
  return (
    <div style={{
      position:'fixed',inset:0,background:'rgba(0,0,0,0.65)',
      display:'flex',alignItems:'center',justifyContent:'center',
      zIndex:200,backdropFilter:'blur(8px)',
    }} onClick={e=>{if(e.target===e.currentTarget&&status==='idle')onClose();}}>
      <div style={{
        background:T.n900,borderRadius:24,padding:'40px 36px',
        width:'100%',maxWidth:400,
        border:`1px solid ${T.n700}`,
        boxShadow:'0 32px 80px rgba(0,0,0,0.6)',
        animation:'slideUp .25s ease',
      }}>

        {status==='idle' && <>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
            <div style={{width:36,height:36,borderRadius:10,background:T.blueDim,border:`1px solid ${T.blueBorder}`,display:'flex',alignItems:'center',justifyContent:'center'}}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={T.blue4} strokeWidth="2" strokeLinecap="round"><polyline points="9 18 15 12 9 6"/></svg>
            </div>
            <h3 style={{fontSize:19,fontWeight:700,color:T.white}}>Confirm Conversion</h3>
          </div>
          <p style={{fontSize:13,color:T.n400,marginBottom:28,paddingLeft:46}}>Review the details below before converting.</p>

          <div style={{background:T.n800,borderRadius:16,padding:20,marginBottom:20,border:`1px solid ${T.n700}`}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:20}}>
              <div style={{textAlign:'center'}}>
                {fromBrand.logo(36)}
                <div style={{fontSize:11,color:T.n400,marginTop:6}}>{fromBrand.name}</div>
                <div style={{fontSize:22,fontWeight:700,color:T.white,fontFamily:'Space Mono,monospace'}}>{Number(fromAmt).toLocaleString()}</div>
                <div style={{fontSize:10,color:T.n400}}>{fromBrand.unit}</div>
              </div>
              <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
                <div style={{width:32,height:1,background:T.n600}}></div>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={T.blue4} strokeWidth="2" strokeLinecap="round"><polyline points="9 18 15 12 9 6"/></svg>
                <div style={{width:32,height:1,background:T.n600}}></div>
              </div>
              <div style={{textAlign:'center'}}>
                {toBrand.logo(36)}
                <div style={{fontSize:11,color:T.n400,marginTop:6}}>{toBrand.name}</div>
                <div style={{fontSize:22,fontWeight:700,color:T.green,fontFamily:'Space Mono,monospace'}}>{toAmt.toLocaleString()}</div>
                <div style={{fontSize:10,color:T.n400}}>{toBrand.unit}</div>
              </div>
            </div>

            {[
              ['Exchange rate', `1 ${unitFrom} = ${rate} ${unitTo}`],
              ['Service fee (1.5%)', `${fee.toLocaleString()} ${fromBrand.unit}`],
            ].map(([k,v])=>(
              <div key={k} style={{display:'flex',justifyContent:'space-between',fontSize:12,color:T.n400,marginBottom:6,fontFamily:'Space Mono,monospace'}}>
                <span>{k}</span>
                <span style={{color:T.n200}}>{v}</span>
              </div>
            ))}
          </div>

          <div style={{display:'flex',gap:10}}>
            <button onClick={onClose} style={{
              flex:1,padding:'13px',borderRadius:12,
              border:`1.5px solid ${T.n700}`,background:'transparent',
              fontSize:13,fontWeight:600,cursor:'pointer',color:T.n300,
              transition:'border-color .15s,color .15s',
            }}
              onMouseEnter={e=>{e.currentTarget.style.borderColor=T.n600;e.currentTarget.style.color=T.white;}}
              onMouseLeave={e=>{e.currentTarget.style.borderColor=T.n700;e.currentTarget.style.color=T.n300;}}>
              Cancel
            </button>
            <button onClick={onConfirm} style={{
              flex:2,padding:'13px',borderRadius:12,border:'none',
              background:T.blue,color:'#fff',fontSize:13,fontWeight:700,cursor:'pointer',
              letterSpacing:'0.02em',transition:'background .2s,box-shadow .2s',
            }}
              onMouseEnter={e=>{e.currentTarget.style.background=T.blue4;e.currentTarget.style.boxShadow=`0 0 24px ${T.blueGlow}`;}}
              onMouseLeave={e=>{e.currentTarget.style.background=T.blue;e.currentTarget.style.boxShadow='none';}}>
              Confirm Convert →
            </button>
          </div>
        </>}

        {status==='loading' && (
          <div style={{textAlign:'center',padding:'48px 0'}}>
            <div style={{width:52,height:52,border:`3px solid ${T.n700}`,borderTopColor:T.blue4,borderRadius:'50%',margin:'0 auto 24px',animation:'spin 0.7s linear infinite'}}></div>
            <div style={{fontSize:17,fontWeight:600,color:T.white,marginBottom:6}}>Processing…</div>
            <div style={{fontSize:13,color:T.n400,fontFamily:'Space Mono,monospace'}}>Settling on-chain</div>
          </div>
        )}

        {status==='success' && (
          <div style={{textAlign:'center',padding:'16px 0'}}>
            <div style={{width:64,height:64,background:T.greenDim,border:`1px solid ${T.green}`,borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 24px'}}>
              <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke={T.green} strokeWidth="2.5" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>
            </div>
            <h3 style={{fontSize:22,fontWeight:700,marginBottom:8,color:T.white}}>Conversion Complete</h3>
            <p style={{fontSize:14,color:T.n400,marginBottom:28}}>
              You received <strong style={{color:T.green}}>{toAmt.toLocaleString()} {toBrand.unit}</strong>
            </p>
            <div style={{display:'flex',gap:12,justifyContent:'center',marginBottom:28}}>
              {[
                {brand:fromBrand,value:`−${Number(fromAmt).toLocaleString()}`,clr:T.red},
                {brand:toBrand,  value:`+${toAmt.toLocaleString()}`,          clr:T.green},
              ].map(({brand,value,clr})=>(
                <div key={brand.id} style={{background:T.n800,border:`1px solid ${T.n700}`,borderRadius:14,padding:'14px 20px',textAlign:'center'}}>
                  {brand.logo(24)}
                  <div style={{fontSize:11,color:T.n400,marginTop:6}}>{brand.name}</div>
                  <div style={{fontSize:17,fontWeight:700,color:clr,fontFamily:'Space Mono,monospace'}}>{value}</div>
                </div>
              ))}
            </div>
            <button onClick={onClose} style={{
              width:'100%',padding:'14px',borderRadius:12,border:'none',
              background:T.blue,color:'white',fontSize:14,fontWeight:700,cursor:'pointer',
            }}>Done</button>
          </div>
        )}
      </div>
    </div>
  );
}

/* ── APP ── */
function App(){
  const [fromId, setFromId]   = useState('mcdonalds');
  const [toId,   setToId]     = useState('starbucks');
  const [fromAmt,setFromAmt]  = useState('');
  const [flipping,setFlipping]= useState(false);
  const [modal,  setModal]    = useState({show:false,status:'idle'});
  const [balances,setBalances]= useState(Object.fromEntries(BRANDS.map(b=>[b.id,b.balance])));
  const [history, setHistory] = useState(HISTORY_INIT);
  const [error,   setError]   = useState('');

  const fromBrand = BRANDS.find(b=>b.id===fromId);
  const toBrand   = BRANDS.find(b=>b.id===toId);
  const rate      = getRate(fromId,toId);
  const numAmt    = parseFloat(fromAmt)||0;
  const fee       = Math.round(numAmt*FEE);
  const toAmt     = Math.round((numAmt-fee)*rate);
  const hasAmt    = numAmt>0;
  const canConvert= hasAmt&&!error&&numAmt<=balances[fromId];

  function handleFlip(){
    setFlipping(true);
    setTimeout(()=>{
      setFromId(toId); setToId(fromId);
      setFromAmt(''); setError(''); setFlipping(false);
    },200);
  }
  function handleFromChange(id){
    if(id===toId) setToId(fromId);
    setFromId(id); setFromAmt(''); setError('');
  }
  function handleToChange(id){
    if(id===fromId) setFromId(toId);
    setToId(id); setError('');
  }
  function handleAmtInput(val){
    setError('');
    if(val===''||/^\d*$/.test(val)){
      setFromAmt(val);
      const n=parseInt(val)||0;
      if(n>balances[fromId]) setError('Insufficient balance');
    }
  }
  function handleConfirm(){
    setModal({show:true,status:'loading'});
    setTimeout(()=>{
      setBalances(prev=>({...prev,[fromId]:prev[fromId]-numAmt,[toId]:prev[toId]+toAmt}));
      setHistory(prev=>[{id:Date.now(),from:fromId,to:toId,fromAmt:numAmt,toAmt,date:'Today'},...prev]);
      setFromAmt('');
      setModal({show:true,status:'success'});
    },1800);
  }

  return (
    <div style={{minHeight:'100vh',background:T.n950,position:'relative',overflow:'hidden'}}>

      {/* Scanline */}
      <div style={{position:'fixed',top:0,left:0,right:0,height:'2px',background:'linear-gradient(to right,transparent,oklch(60% 0.22 250 / 0.12),transparent)',pointerEvents:'none',zIndex:999,animation:'scanline 8s linear infinite'}}></div>

      {/* Background grid */}
      <div style={{position:'fixed',inset:0,backgroundImage:'linear-gradient(oklch(60% 0.22 250 / 0.03) 1px,transparent 1px),linear-gradient(90deg,oklch(60% 0.22 250 / 0.03) 1px,transparent 1px)',backgroundSize:'60px 60px',pointerEvents:'none',zIndex:0}}></div>

      {/* Background glow */}
      <div style={{position:'fixed',top:'30%',left:'50%',transform:'translateX(-50%)',width:600,height:400,background:'radial-gradient(ellipse,oklch(60% 0.22 250 / 0.06) 0%,transparent 70%)',pointerEvents:'none',zIndex:0}}></div>

      {/* ── NAV ── */}
      <nav style={{
        position:'sticky',top:0,zIndex:100,
        display:'flex',alignItems:'center',justifyContent:'space-between',
        padding:'0 48px',height:60,
        background:'oklch(5% 0.02 250 / 0.9)',
        backdropFilter:'blur(16px)',
        borderBottom:`1px solid oklch(60% 0.22 250 / 0.12)`,
      }}>
        <a href="index.html" style={{display:'flex',alignItems:'center',gap:10,textDecoration:'none'}}>
          <CryonLogo size={30}/>
          <span style={{fontFamily:'Space Mono,monospace',fontSize:16,fontWeight:700,color:T.white,letterSpacing:'0.04em'}}>CRYON</span>
        </a>

        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <div style={{display:'flex',alignItems:'center',gap:8,background:T.n800,border:`1px solid ${T.n700}`,borderRadius:10,padding:'7px 14px',marginRight:4}}>
            <div style={{width:7,height:7,borderRadius:'50%',background:T.green,animation:'pulse 2s ease-in-out infinite'}}></div>
            <span style={{fontSize:12,fontWeight:500,color:T.n200,fontFamily:'Space Mono,monospace'}}>0x4f…a3b2</span>
          </div>
          <button style={{
            background:T.blue,color:'white',border:'none',borderRadius:10,
            padding:'8px 18px',fontSize:13,fontWeight:600,cursor:'pointer',
            fontFamily:'Space Grotesk,sans-serif',letterSpacing:'0.02em',
            transition:'background .2s,box-shadow .2s',
          }}
            onMouseEnter={e=>{e.currentTarget.style.background=T.blue4;e.currentTarget.style.boxShadow=`0 0 20px ${T.blueGlow}`;}}
            onMouseLeave={e=>{e.currentTarget.style.background=T.blue;e.currentTarget.style.boxShadow='none';}}>
            My Points
          </button>
        </div>
      </nav>

      {/* ── BODY ── */}
      <div style={{maxWidth:520,margin:'0 auto',padding:'48px 20px 96px',position:'relative',zIndex:1}}>

        {/* Header */}
        <div style={{textAlign:'center',marginBottom:36}}>
          <div style={{
            display:'inline-flex',alignItems:'center',gap:8,
            background:T.blueDim,border:`1px solid ${T.blueBorder}`,
            borderRadius:100,padding:'5px 14px',
            fontFamily:'Space Mono,monospace',fontSize:11,color:T.blue4,
            letterSpacing:'0.08em',textTransform:'uppercase',marginBottom:20,
          }}>
            <span style={{width:6,height:6,borderRadius:'50%',background:T.blue4,display:'inline-block',boxShadow:`0 0 8px ${T.blue4}`,animation:'pulse 2s ease-in-out infinite'}}></span>
            Points Converter
          </div>
          <h1 style={{fontSize:32,fontWeight:700,color:T.white,letterSpacing:'-0.02em',marginBottom:8,lineHeight:1.1}}>
            Convert Your Points
          </h1>
          <p style={{fontSize:14,color:T.n400}}>Swap loyalty rewards across your favourite brands</p>
        </div>

        {/* ── SWAP CARD ── */}
        <div style={{
          background:T.n900,borderRadius:24,padding:24,
          border:`1px solid ${T.n800}`,
          boxShadow:'0 4px 32px rgba(0,0,0,0.4)',
          marginBottom:16,
        }}>

          {/* FROM */}
          <div style={{
            background:T.n800,borderRadius:16,padding:20,
            border:`1px solid ${error ? 'oklch(60% 0.22 25 / 0.4)' : T.n700}`,
            opacity:flipping?0:1,transition:'opacity .2s,border-color .2s',
          }}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
              <span style={{fontSize:11,fontWeight:600,color:T.n400,letterSpacing:'0.1em',textTransform:'uppercase',fontFamily:'Space Mono,monospace'}}>From</span>
              <span style={{fontSize:12,color:T.n400}}>
                Balance: <strong style={{color:fromBrand.color,fontFamily:'Space Mono,monospace'}}>{balances[fromId].toLocaleString()}</strong>
              </span>
            </div>
            <BrandDropdown selected={fromId} onChange={handleFromChange} exclude={toId}/>

            <div style={{marginTop:14,position:'relative'}}>
              <input
                type="number" min="0"
                value={fromAmt}
                onChange={e=>handleAmtInput(e.target.value)}
                placeholder="0"
                style={{
                  width:'100%',padding:'14px 110px 14px 18px',
                  fontSize:30,fontWeight:700,color:T.white,
                  background:T.n900,
                  border:`1.5px solid ${error ? 'oklch(60% 0.22 25 / 0.5)' : hasAmt ? T.blueBorder : T.n700}`,
                  borderRadius:14,outline:'none',
                  fontFamily:'Space Mono,monospace',
                  transition:'border-color .15s',
                  boxShadow: hasAmt&&!error ? `0 0 0 3px ${T.blueDim}` : 'none',
                }}
              />
              <div style={{position:'absolute',right:14,top:'50%',transform:'translateY(-50%)',display:'flex',gap:6}}>
                {['HALF','MAX'].map(lbl=>(
                  <button key={lbl} onClick={()=>handleAmtInput(String(lbl==='MAX'?balances[fromId]:Math.floor(balances[fromId]/2)))} style={{
                    background:T.n700,border:`1px solid ${T.n600}`,borderRadius:6,
                    padding:'4px 8px',fontSize:10,fontWeight:700,color:T.n300,
                    cursor:'pointer',fontFamily:'Space Mono,monospace',letterSpacing:'0.05em',
                    transition:'background .1s,color .1s',
                  }}
                    onMouseEnter={e=>{e.currentTarget.style.background=T.n600;e.currentTarget.style.color=T.white;}}
                    onMouseLeave={e=>{e.currentTarget.style.background=T.n700;e.currentTarget.style.color=T.n300;}}>{lbl}</button>
                ))}
              </div>
            </div>
            {error && (
              <div style={{display:'flex',alignItems:'center',gap:6,marginTop:8}}>
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke={T.red} strokeWidth="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
                <span style={{fontSize:12,color:T.red,fontWeight:500}}>{error}</span>
              </div>
            )}
          </div>

          {/* FLIP */}
          <div style={{display:'flex',justifyContent:'center',margin:'12px 0'}}>
            <button onClick={handleFlip} style={{
              width:40,height:40,borderRadius:'50%',
              background:T.n800,border:`1.5px solid ${T.n700}`,
              display:'flex',alignItems:'center',justifyContent:'center',
              cursor:'pointer',boxShadow:'0 2px 12px rgba(0,0,0,0.3)',
              transition:'transform .3s,border-color .2s,box-shadow .2s',
            }}
              onMouseEnter={e=>{e.currentTarget.style.transform='rotate(180deg)';e.currentTarget.style.borderColor=T.blue4;e.currentTarget.style.boxShadow=`0 0 16px ${T.blueGlow}`;}}
              onMouseLeave={e=>{e.currentTarget.style.transform='none';e.currentTarget.style.borderColor=T.n700;e.currentTarget.style.boxShadow='0 2px 12px rgba(0,0,0,0.3)';}}>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={T.n200} strokeWidth="2.5" strokeLinecap="round">
                <polyline points="17 1 21 5 17 9"/>
                <path d="M3 11V9a4 4 0 0 1 4-4h14"/>
                <polyline points="7 23 3 19 7 15"/>
                <path d="M21 13v2a4 4 0 0 1-4 4H3"/>
              </svg>
            </button>
          </div>

          {/* TO */}
          <div style={{
            background:T.n800,borderRadius:16,padding:20,
            border:`1px solid ${hasAmt&&!error ? 'oklch(65% 0.18 155 / 0.3)' : T.n700}`,
            opacity:flipping?0:1,transition:'opacity .2s,border-color .2s',
          }}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
              <span style={{fontSize:11,fontWeight:600,color:T.n400,letterSpacing:'0.1em',textTransform:'uppercase',fontFamily:'Space Mono,monospace'}}>To</span>
              <span style={{fontSize:12,color:T.n400}}>
                Balance: <strong style={{color:toBrand.color,fontFamily:'Space Mono,monospace'}}>{balances[toId].toLocaleString()}</strong>
              </span>
            </div>
            <BrandDropdown selected={toId} onChange={handleToChange} exclude={fromId}/>

            <div style={{marginTop:14}}>
              <div style={{
                padding:'14px 18px',
                fontSize:30,fontWeight:700,
                color: hasAmt&&!error ? T.green : T.n600,
                background:T.n900,
                border:`1.5px solid ${hasAmt&&!error ? 'oklch(65% 0.18 155 / 0.3)' : T.n700}`,
                borderRadius:14,minHeight:66,
                display:'flex',alignItems:'center',
                fontFamily:'Space Mono,monospace',
                boxShadow: hasAmt&&!error ? '0 0 0 3px oklch(65% 0.18 155 / 0.08)' : 'none',
                transition:'all .2s',
              }}>
                {hasAmt&&!error ? toAmt.toLocaleString() : '—'}
              </div>
            </div>
          </div>

          {/* RATE ROW */}
          {hasAmt&&!error && (
            <div style={{
              display:'flex',justifyContent:'center',gap:12,marginTop:14,
              fontSize:12,color:T.n400,fontFamily:'Space Mono,monospace',
              animation:'fadeIn .2s ease',
            }}>
              <span>1 {fromBrand.unit.replace(/s$/,'')} = <strong style={{color:T.blue3}}>{rate}</strong> {toBrand.unit.replace(/s$/,'')}</span>
              <span style={{color:T.n700}}>·</span>
              <span>Fee: <strong style={{color:T.n200}}>{fee.toLocaleString()} pts</strong></span>
            </div>
          )}

          {/* CTA */}
          <button onClick={()=>canConvert&&setModal({show:true,status:'idle'})} style={{
            width:'100%',marginTop:18,padding:'16px',
            borderRadius:14,border:'none',
            background: canConvert ? T.blue : T.n800,
            color: canConvert ? 'white' : T.n600,
            fontSize:15,fontWeight:700,cursor:canConvert?'pointer':'not-allowed',
            letterSpacing:'-0.01em',fontFamily:'Space Grotesk,sans-serif',
            transition:'background .2s,box-shadow .2s,transform .1s',
          }}
            onMouseEnter={e=>{if(canConvert){e.currentTarget.style.background=T.blue4;e.currentTarget.style.boxShadow=`0 0 32px ${T.blueGlow}`;e.currentTarget.style.transform='translateY(-1px)';}}}
            onMouseLeave={e=>{if(canConvert){e.currentTarget.style.background=T.blue;e.currentTarget.style.boxShadow='none';e.currentTarget.style.transform='none';}}}>
            {canConvert ? `Convert ${Number(fromAmt).toLocaleString()} ${fromBrand.unit} →` : 'Enter an amount to convert'}
          </button>
        </div>

        {/* ── BEFORE / AFTER ── */}
        {hasAmt&&!error && (
          <div style={{
            background:T.n900,borderRadius:20,padding:'20px 24px',
            border:`1px solid ${T.n800}`,marginBottom:16,
            boxShadow:'0 4px 24px rgba(0,0,0,0.3)',
            animation:'fadeIn .3s ease',
          }}>
            <div style={{fontSize:11,fontWeight:600,color:T.n400,letterSpacing:'0.1em',textTransform:'uppercase',fontFamily:'Space Mono,monospace',marginBottom:16}}>
              Balance Preview
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              {[
                {brand:fromBrand,before:balances[fromId],after:balances[fromId]-numAmt,delta:-numAmt},
                {brand:toBrand,  before:balances[toId],  after:balances[toId]+toAmt,    delta:+toAmt},
              ].map(({brand,before,after,delta})=>(
                <div key={brand.id} style={{background:T.n800,border:`1px solid ${T.n700}`,borderRadius:14,padding:'16px'}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
                    {brand.logo(20)}
                    <span style={{fontSize:12,fontWeight:600,color:T.n200}}>{brand.name}</span>
                  </div>
                  {[['Before',before,T.n300],['After',after,delta<0?T.red:T.green]].map(([lbl,val,clr])=>(
                    <div key={lbl} style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:4}}>
                      <span style={{color:T.n400}}>{lbl}</span>
                      <span style={{color:clr,fontWeight:600,fontFamily:'Space Mono,monospace'}}>{val.toLocaleString()}</span>
                    </div>
                  ))}
                  <div style={{marginTop:8,fontSize:11,color:delta<0?T.red:T.green,fontFamily:'Space Mono,monospace',fontWeight:700,textAlign:'right'}}>
                    {delta>0?'+':''}{delta.toLocaleString()}
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ── HISTORY ── */}
        <div style={{
          background:T.n900,borderRadius:20,padding:'20px 24px',
          border:`1px solid ${T.n800}`,
          boxShadow:'0 4px 24px rgba(0,0,0,0.3)',
        }}>
          <div style={{fontSize:11,fontWeight:600,color:T.n400,letterSpacing:'0.1em',textTransform:'uppercase',fontFamily:'Space Mono,monospace',marginBottom:16}}>
            Recent Conversions
          </div>
          {history.length===0&&(
            <div style={{textAlign:'center',padding:'24px 0',color:T.n600,fontSize:13,fontFamily:'Space Mono,monospace'}}>No conversions yet</div>
          )}
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {history.slice(0,5).map(h=>{
              const fb=BRANDS.find(b=>b.id===h.from);
              const tb=BRANDS.find(b=>b.id===h.to);
              return (
                <div key={h.id} style={{
                  display:'flex',alignItems:'center',gap:12,
                  padding:'12px 14px',background:T.n800,borderRadius:12,
                  border:`1px solid ${T.n700}`,
                  transition:'border-color .2s',
                }}
                  onMouseEnter={e=>e.currentTarget.style.borderColor=T.n600}
                  onMouseLeave={e=>e.currentTarget.style.borderColor=T.n700}>
                  <div style={{display:'flex',alignItems:'center',gap:6}}>
                    {fb&&fb.logo(20)}
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke={T.n600} strokeWidth="2.5"><polyline points="9 18 15 12 9 6"/></svg>
                    {tb&&tb.logo(20)}
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:600,color:T.n200}}>{fb&&fb.name} → {tb&&tb.name}</div>
                    <div style={{fontSize:11,color:T.n400,fontFamily:'Space Mono,monospace'}}>{h.date}</div>
                  </div>
                  <div style={{textAlign:'right'}}>
                    <div style={{fontSize:13,fontWeight:700,color:T.green,fontFamily:'Space Mono,monospace'}}>+{h.toAmt.toLocaleString()}</div>
                    <div style={{fontSize:11,color:T.n400,fontFamily:'Space Mono,monospace'}}>−{h.fromAmt.toLocaleString()}</div>
                  </div>
                  <div style={{
                    background:T.greenDim,color:T.green,
                    fontSize:10,fontWeight:700,padding:'3px 8px',
                    borderRadius:20,textTransform:'uppercase',
                    letterSpacing:'0.05em',fontFamily:'Space Mono,monospace',
                    border:`1px solid ${T.green}40`,
                  }}>Done</div>
                </div>
              );
            })}
          </div>
        </div>

      </div>

      {/* MODAL */}
      <Modal
        show={modal.show}
        onClose={()=>setModal({show:false,status:'idle'})}
        fromBrand={fromBrand} toBrand={toBrand}
        fromAmt={fromAmt} toAmt={toAmt}
        rate={rate} fee={fee}
        onConfirm={handleConfirm}
        status={modal.status}
      />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
